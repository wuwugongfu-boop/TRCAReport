<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TRCA台灣扶輪人自行車協會 繳費回報系統</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet" />
<style>
:root{--ink:#2a1d18;--soft:#8a6f63;--line:#f0e3dc;--brand:#e8502e;--brand-d:#c93a1c;--bg:#fbf6f2;--red:#d63a28;--red-bg:#fce7e2;--green:#1f8a52;--grad:linear-gradient(120deg,#f08a3c 0%,#e8502e 55%,#d63a28 100%);--grad-dark:linear-gradient(125deg,#3a2118 0%,#5a2a1a 45%,#7a3320 100%);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;color:var(--ink);}
.mono{font-family:'JetBrains Mono',monospace;}
.spin{animation:spin 1s linear infinite;}@keyframes spin{to{transform:rotate(360deg);}}
.icon{width:1em;height:1em;display:inline-block;vertical-align:-0.125em;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.page{min-height:100vh;background:var(--bg);background-image:radial-gradient(circle at 50% -10%,rgba(240,138,60,.16),transparent 45%),radial-gradient(circle at 90% 100%,rgba(232,80,46,.08),transparent 40%);display:flex;justify-content:center;align-items:flex-start;padding:34px 16px;}
.card{background:#fff;width:100%;max-width:480px;border-radius:24px;overflow:hidden;box-shadow:0 24px 60px rgba(120,50,25,.16);}
.head{background:var(--grad-dark);color:#fff;padding:28px 26px 26px;position:relative;overflow:hidden;}.head::after{content:'';position:absolute;top:-40%;right:-15%;width:60%;height:200%;background:linear-gradient(120deg,rgba(240,138,60,.3),transparent 60%);transform:rotate(15deg);pointer-events:none;}.head-logo{height:40px;display:block;margin-bottom:14px;position:relative;z-index:1;}
.head-brand{display:flex;align-items:center;gap:9px;font-size:19px;font-weight:900;position:relative;z-index:1;letter-spacing:.5px;}
.head-sub{margin-top:7px;font-size:13px;opacity:.9;line-height:1.5;}
.form{padding:22px 26px 28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:13px;color:var(--soft);margin-bottom:7px;font-weight:500;}
.field label em{color:var(--red);font-style:normal;margin-left:3px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
input,select{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-size:15px;outline:none;font-family:inherit;color:var(--ink);background:#fff;}
input:focus,select:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(15,92,107,.12);}
.locked{background:#f4f7f8;color:var(--soft);cursor:not-allowed;}
.select-box{position:relative;}
.select-box select{appearance:none;padding-right:38px;cursor:pointer;}
.chev{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--soft);pointer-events:none;}
.prefix-input{display:flex;align-items:center;border:1px solid var(--line);border-radius:10px;overflow:hidden;}
.prefix-input:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px rgba(15,92,107,.12);}
.prefix-input span{padding:0 12px;color:var(--soft);font-weight:600;}
.prefix-input input{border:none;box-shadow:none;padding-left:0;}
.upload{display:flex;align-items:center;gap:9px;border:1.5px dashed var(--line);border-radius:10px;padding:13px;color:var(--soft);font-size:14px;}
.err{display:flex;align-items:center;gap:4px;color:var(--red);font-size:12px;margin-top:5px;}
.hint-line{display:flex;align-items:center;gap:5px;font-size:12px;margin-top:5px;color:var(--soft);}
.hint-line.ok{color:var(--green);}
.hint-line.bad{color:var(--red);}
.submit{width:100%;background:var(--grad);color:#fff;border:none;padding:15px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;box-shadow:0 8px 20px rgba(232,80,46,.32);transition:.18s;letter-spacing:1px;}
.submit:hover{filter:brightness(1.05);transform:translateY(-1px);box-shadow:0 11px 26px rgba(232,80,46,.42);}
.submit:disabled{opacity:.7;cursor:default;}
.tip{text-align:center;font-size:12px;color:var(--soft);margin-top:12px;}
.done-card{padding:40px 30px 30px;text-align:center;}
.done-icon{color:var(--green);display:flex;justify-content:center;margin-bottom:12px;font-size:46px;}
.done-card h2{font-size:20px;}
.done-sub{color:var(--soft);font-size:13.5px;margin-top:7px;}
.done-box{text-align:left;background:#f6f9fa;border-radius:12px;padding:8px 16px;margin:22px 0 16px;}
.done-row{display:flex;justify-content:space-between;padding:9px 0;font-size:14px;border-bottom:1px solid #eef2f4;gap:12px;}
.done-row:last-child{border-bottom:none;}
.done-row span{color:var(--soft);flex-shrink:0;}
.done-row b{text-align:right;}
.done-note{display:flex;align-items:center;gap:6px;justify-content:center;background:#fdf2dd;color:#b5740a;font-size:12.5px;padding:9px;border-radius:9px;}
@media(max-width:430px){.row2{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

/* ============================================================
   👉 使用前：把下面的 API_URL 換成你的 Apps Script Web App 網址
   👉 專屬連結：表單網址後加 ?activity=活動代碼&code=協會編號
      例如  你的表單.html?activity=TRCA20261030&code=842
============================================================ */
const API_URL = "https://script.google.com/macros/s/AKfycbxwvJrds6qO1sQSndDaxiWrVDFcYSi_lDwSrVuuWhCvNOZNSpoX2psIiaptXjAQnLz3/exec";

const I = {
  wallet:'<rect x="2" y="5" width="20" height="14" rx="2"/><path d="M16 12h.01M2 9h20"/>',
  check:'<path d="M20 6 9 17l-5-5"/>',
  upload:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>',
  alert:'<circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>',
  check2:'<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m22 4-10 10.01-3-3"/>',
  chevron:'<path d="m6 9 6 6 6-6"/>',
  loader:'<path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"/>',
};
const Icon = ({n,cls,sz}) => <svg className={"icon "+(cls||"")} style={sz?{width:sz,height:sz}:null} viewBox="0 0 24 24" dangerouslySetInnerHTML={{__html:I[n]}} />;

function Field({label,error,required,children}){
  return <div className="field"><label>{label}{required&&<em>*</em>}</label>{children}{error&&<div className="err"><Icon n="alert"/> {error}</div>}</div>;
}
function DoneRow({label,value,mono}){
  return <div className="done-row"><span>{label}</span><b className={mono?"mono":""}>{value}</b></div>;
}

function App(){
  const [activities,setActivities]=useState([]);
  const [loadingAct,setLoadingAct]=useState(true);
  const [form,setForm]=useState({activity:"",code:"",name:"",amount:"",last5:"",date:"",time:"",img:null});
  const [locked,setLocked]=useState({activity:false,code:false});
  const [errors,setErrors]=useState({});
  const [submitting,setSubmitting]=useState(false);
  const [done,setDone]=useState(false);
  const [looking,setLooking]=useState(false);   // 查姓名中
  const [lookMsg,setLookMsg]=useState("");       // 查詢結果訊息

  useEffect(()=>{
    fetch(API_URL+"?action=getActivities").then(r=>r.json()).then(d=>{if(d.ok)setActivities(d.activities||[]);}).catch(()=>{}).finally(()=>setLoadingAct(false));
    const params=new URLSearchParams(window.location.search);
    const a=params.get("activity"),c=params.get("code"),n=params.get("name");
    if(a||c){
      const cc=c?c.toUpperCase().replace(/\s/g,""):"";
      setForm(f=>({...f,activity:a||f.activity,code:cc||f.code,name:n||f.name}));
      setLocked({activity:!!a,code:!!c});
      // 帶入編號但沒帶姓名時，自動查一次
      if(a&&cc&&!n){
        fetch(API_URL+"?action=lookup&activity="+encodeURIComponent(a)+"&code="+encodeURIComponent(cc))
          .then(r=>r.json()).then(d=>{
            if(d.ok&&d.found){ setForm(f=>({...f,name:d.name})); setLookMsg("已帶出："+d.name); }
            else if(d.ok&&!d.found){ setLookMsg("查無此編號，請聯絡協會"); }
          }).catch(()=>{});
      }
    }
  },[]);

  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const onCode=(v)=>{ set("code",v.toUpperCase().replace(/\s/g,"")); setLookMsg(""); set("name",""); };
  const onAmount=(v)=>set("amount",v.replace(/[^\d]/g,""));
  const onLast5=(v)=>set("last5",v.replace(/[^\d]/g,"").slice(0,5));

  // 用協會編號自動查姓名（離開編號欄位或按 Enter 時觸發）
  const lookupName=async()=>{
    const code=form.code.trim();
    if(!form.activity){ setLookMsg("請先選擇活動"); return; }
    if(!code){ return; }
    setLooking(true); setLookMsg("");
    try{
      const r=await fetch(API_URL+"?action=lookup&activity="+encodeURIComponent(form.activity)+"&code="+encodeURIComponent(code));
      const d=await r.json();
      if(d.ok&&d.found){ set("name",d.name); setLookMsg("已帶出：" + d.name); }
      else if(d.ok&&!d.found){ set("name",""); setLookMsg("查無此編號，請確認後重新輸入"); }
      else { setLookMsg(d.error||"查詢失敗"); }
    }catch{ setLookMsg("查詢失敗，請稍後再試"); }
    finally{ setLooking(false); }
  };

  const validate=()=>{
    const e={};
    if(!form.activity)e.activity="請選擇活動";
    if(!form.code)e.code="請填寫協會編號";
    if(!form.name.trim())e.name="請填寫姓名";
    if(!form.amount)e.amount="請填寫匯款金額";
    if(form.last5.length!==5)e.last5="末五碼需為 5 位數字";
    if(!form.date)e.date="請選擇匯款日期";
    setErrors(e);return Object.keys(e).length===0;
  };

  const handleSubmit=async()=>{
    if(!validate())return; setSubmitting(true);
    try{
      await fetch(API_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({
        action:"report",activity:form.activity,code:form.code,name:form.name,amount:form.amount,last5:form.last5,date:form.date,time:form.time,img:""
      })});
      setDone(true);
    }catch{alert("送出失敗，請稍後再試或聯絡主辦單位");}finally{setSubmitting(false);}
  };

  if(done){
    const act=(activities.find(a=>a.id===form.activity)||{}).name||form.activity;
    return (
      <div className="page"><div className="card done-card">
        <div className="done-icon"><Icon n="check2" sz="46px"/></div>
        <h2>已收到您的匯款回報</h2>
        <p className="done-sub">管理員確認後即完成對帳，請耐心等候</p>
        <div className="done-box">
          <DoneRow label="活動" value={act}/>
          <DoneRow label="協會編號" value={form.code} mono/>
          <DoneRow label="姓名" value={form.name}/>
          <DoneRow label="匯款金額" value={"$"+Number(form.amount).toLocaleString()} mono/>
          <DoneRow label="末五碼" value={form.last5} mono/>
          <DoneRow label="匯款日期" value={form.date+(form.time?" "+form.time:"")}/>
        </div>
        <div className="done-note"><Icon n="alert"/> 請勿重複送出。如需修改，請聯絡主辦單位。</div>
      </div></div>
    );
  }

  return (
    <div className="page"><div className="card">
      <div className="head">

        <div className="head-brand">繳費回報系統</div>
        <p className="head-sub">台灣扶輪人自行車協會 — 完成匯款後，請填寫以下資料供協會對帳</p>
      </div>
      <div className="form">
        <Field label="選擇活動" error={errors.activity} required>
          <div className="select-box">
            <select value={form.activity} disabled={locked.activity||loadingAct} onChange={e=>set("activity",e.target.value)} className={locked.activity?"locked":""}>
              <option value="">{loadingAct?"載入中…":"— 請選擇 —"}</option>
              {activities.map(a=><option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
            <span className="chev"><Icon n="chevron"/></span>
          </div>
        </Field>
        <div className="row2">
          <Field label="協會編號" error={errors.code} required>
            <input value={form.code} disabled={locked.code} className={locked.code?"locked":""} placeholder="例如 842"
              onChange={e=>onCode(e.target.value)}
              onBlur={lookupName}
              onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();lookupName();}}}/>
            {looking&&<div className="hint-line"><Icon n="loader" cls="spin"/> 查詢姓名中…</div>}
            {!looking&&lookMsg&&<div className={"hint-line"+(form.name?" ok":" bad")}>{lookMsg}</div>}
          </Field>
          <Field label="姓名（系統自動帶出）" error={errors.name} required>
            <input value={form.name} readOnly placeholder="輸入編號後自動帶出"
              className="locked" style={{cursor:"default"}}/>
          </Field>
        </div>
        <div className="row2">
          <Field label="匯款金額" error={errors.amount} required>
            <div className="prefix-input"><span>$</span><input value={form.amount} placeholder="43900" inputMode="numeric" onChange={e=>onAmount(e.target.value)}/></div>
          </Field>
          <Field label="帳號末五碼" error={errors.last5} required>
            <input value={form.last5} placeholder="12345" inputMode="numeric" onChange={e=>onLast5(e.target.value)}/>
          </Field>
        </div>
        <div className="row2">
          <Field label="匯款日期" error={errors.date} required>
            <input type="date" value={form.date} onChange={e=>set("date",e.target.value)}/>
          </Field>
          <Field label="匯款時間（可選）">
            <input type="time" value={form.time} onChange={e=>set("time",e.target.value)}/>
          </Field>
        </div>
        <Field label="上傳匯款截圖（第二版開放）">
          <label className="upload" style={{opacity:.55,cursor:"not-allowed"}}><Icon n="upload"/><span>第二版開放上傳</span></label>
        </Field>
        <button className="submit" onClick={handleSubmit} disabled={submitting}>
          <Icon n={submitting?"loader":"check"} cls={submitting?"spin":""}/> {submitting?"送出中…":"送出回報"}
        </button>
        <p className="tip">送出前請確認金額與末五碼正確，以加速對帳。</p>
      </div>
    </div></div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
